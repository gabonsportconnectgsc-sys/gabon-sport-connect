<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GSC Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase (SDK compat — requis par realtime-sync-module.js) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

<!-- Chart.js (requis par l'onglet Rapports) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<!-- QR Code — génération via image distante (voir drawQrOnCanvas), fiable sans lib JS tierce.
     jsQR reste nécessaire pour le SCAN caméra (lecture de QR, fonction différente). -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" defer></script>

<!-- Supabase (Authentication uniquement — Firestore/Storage restent sur Firebase) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
:root { --green: #009E60; --green-dk: #007a47; --green-lt: #e6f7ef; --yellow: #FFD700; --navy: #0A1628; --navy-md: #1a2d4a; --white: #fff; --gray-bg: #F0F2F5; --gray-bd: #e2e8f0; --gray-txt: #64748b; --danger: #ef4444; --warn: #f59e0b; --blue: #3b82f6; --purple: #8b5cf6; --orange: #f97316; --teal: #0d9488; --sidebar-w: 240px; --topbar-h: 60px; --mobile-nav-h: 62px; --font: 'Inter',system-ui,sans-serif; --font-display: 'Syne',sans-serif; --radius: 12px; --radius-lg: 22px; --shadow: 0 2px 12px rgba(0,0,0,.08); }

*, ::before, ::after { box-sizing: border-box; margin: 0px; padding: 0px; }

body { font-family: var(--font); background: var(--gray-bg); color: var(--navy); min-height: 100vh; overflow-x: hidden; }

html { overflow-x: hidden; }

img, svg, canvas { max-width: 100%; }

.main-content, .app-tiles-grid, .role-items-grid, .filters-bar, .dash-grid { max-width: 100%; min-width: 0; }

.app-tile, .role-item, .stat-card, .dash-card { min-width: 0; }

@keyframes fadeUp { 
  0% { opacity: 0; transform: translateY(14px); }
  100% { opacity: 1; transform: translateY(0px); }
}

@keyframes spin { 
  100% { transform: rotate(360deg); }
}

@keyframes pulse { 
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes bounceIn { 
  0% { transform: scale(0.85); opacity: 0; }
  60% { transform: scale(1.03); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes slideIn { 
  0% { transform: translateX(100%); opacity: 0; }
  100% { transform: translateX(0px); opacity: 1; }
}

#loading-screen { position: fixed; inset: 0px; background: linear-gradient(135deg,var(--navy),#0d3a1f); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; }

.loading-logo { font-size: 56px; animation: 0.6s ease 0s 1 normal none running bounceIn; }

.loading-title { font-size: 22px; font-weight: 800; color: rgb(255, 255, 255); }

.loading-sub { font-size: 13px; color: rgba(255, 255, 255, 0.5); animation: 1.5s ease 0s infinite normal none running pulse; }

.spinner { width: 36px; height: 36px; border-width: 3px; border-style: solid; border-right-color: rgba(255, 255, 255, 0.12); border-bottom-color: rgba(255, 255, 255, 0.12); border-left-color: rgba(255, 255, 255, 0.12); border-image: initial; border-top-color: var(--green); border-radius: 50%; animation: 0.8s linear 0s infinite normal none running spin; }

#app { display: none; }
#app.gate-locked { display: none !important; }

.layout { display: flex; min-height: 100vh; }

.sidebar { width: var(--sidebar-w); background: linear-gradient(180deg,var(--navy),#0d2035); position: fixed; top: 0px; left: 0px; height: 100vh; z-index: 200; display: flex; flex-direction: column; transition: transform 0.3s; overflow-y: auto; }

.sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }

.sidebar-brand { display: flex; align-items: center; gap: 10px; }

.brand-icon { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg,var(--green),var(--green-dk)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

.brand-text { font-family: var(--font-display); font-size: 15px; font-weight: 800; color: rgb(255, 255, 255); }

.brand-sub { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 0.5px; }

.admin-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(255, 215, 0, 0.15); border: 1px solid rgba(255, 215, 0, 0.3); color: var(--yellow); font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-top: 8px; }

.sidebar-nav { flex: 1 1 0%; padding: 10px 8px; }

.nav-label { font-size: 10px; font-weight: 700; color: rgba(255, 255, 255, 0.28); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 10px 5px; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: 0.18s; color: rgba(255, 255, 255, 0.6); font-size: 13px; font-weight: 500; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; background: none; width: 100%; text-align: left; position: relative; }

.nav-item:hover { background: rgba(255, 255, 255, 0.07); color: rgb(255, 255, 255); }

.nav-item.active { background: linear-gradient(135deg, rgba(0, 158, 96, 0.35), rgba(0, 158, 96, 0.12)); color: rgb(255, 255, 255); font-weight: 600; }

.nav-item.active::before { content: ""; position: absolute; left: 0px; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--green); border-radius: 0px 4px 4px 0px; }

.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

#nav-open-app { color: var(--green); font-weight: 700; background: rgba(0, 158, 96, 0.1); border: 1px solid rgba(0, 158, 96, 0.25); }

#nav-open-app:hover { background: rgba(0, 158, 96, 0.22); color: rgb(255, 255, 255); }

.sidebar-footer { padding: 12px; border-top: 1px solid rgba(255, 255, 255, 0.08); }

.admin-profile { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); margin-bottom: 8px; }

.admin-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,var(--green),var(--yellow)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--navy); flex-shrink: 0; }

.admin-info { flex: 1 1 0%; min-width: 0px; }

.admin-name { font-size: 12px; font-weight: 700; color: rgb(255, 255, 255); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.admin-role { font-size: 10px; color: rgba(255, 255, 255, 0.4); }

.btn-logout { width: 100%; padding: 9px; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: rgb(252, 165, 165); font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s; }

.btn-logout:hover { background: rgba(239, 68, 68, 0.25); }

.topbar { position: fixed; top: 0px; left: var(--sidebar-w); right: 0px; height: var(--topbar-h); background: rgb(255, 255, 255); border-bottom: 1px solid var(--gray-bd); display: flex; align-items: center; gap: 12px; padding: 0px 20px; z-index: 100; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 4px; }

.btn-menu { display: none; width: 36px; height: 36px; border-radius: 9px; border: 1.5px solid var(--gray-bd); background: rgb(255, 255, 255); align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; }

.topbar-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--navy); flex: 1 1 0%; }

.topbar-sub { font-size: 12px; font-weight: 500; color: var(--gray-txt); margin-left: 6px; }

.sync-indicator { display: none; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--green); background: var(--green-lt); padding: 5px 10px; border-radius: 20px; }

.sync-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: 1.5s ease 0s infinite normal none running pulse; }

#realtime-status { display: inline-flex; align-items: center; gap: 5px; background: rgba(0, 158, 96, 0.12); border: 1px solid rgba(0, 158, 96, 0.25); color: var(--green); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px; }

#gsc-sync-badge { position: fixed; top: 14px; right: 16px; background: var(--green); color: rgb(255, 255, 255); padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; display: none; align-items: center; gap: 7px; z-index: 9999; box-shadow: rgba(0, 158, 96, 0.3) 0px 4px 14px; }

#gsc-sync-badge .gsc-sync-dot { width: 7px; height: 7px; background: rgb(255, 255, 255); border-radius: 50%; animation: 1.4s ease 0s infinite normal none running pulse; }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy); color: rgb(255, 255, 255); padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 10000; box-shadow: rgba(0, 0, 0, 0.2) 0px 4px 16px; animation: 0.3s ease 0s 1 normal none running slideIn; }

.toast.success { background: rgb(0, 158, 96); }

.toast.error { background: var(--danger); }

.toast.warn { background: var(--warn); color: var(--navy); }

.toast.info { background: var(--blue); }

.realtime-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(0, 158, 96, 0.12); border: 1px solid rgba(0, 158, 96, 0.25); color: var(--green); font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-left: 8px; }

.realtime-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; animation: 2s ease 0s infinite normal none running pulse; }

.main-content { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); padding: 22px; min-height: calc(100vh - var(--topbar-h)); }

.section { display: none; animation: 0.3s ease 0s 1 normal none running fadeUp; }

.section.active { display: block; }

.admin-header { background: linear-gradient(135deg,var(--navy),var(--navy-md) 55%,#0d3a1f); border-radius: var(--radius-lg); padding: 24px 22px; color: rgb(255, 255, 255); margin-bottom: 20px; position: relative; overflow: hidden; }

.admin-header::after { content: "⚙️"; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 60px; opacity: 0.1; }

.admin-header-title { font-family: var(--font-display); font-size: 22px; font-weight: 800; }

.admin-header-sub { font-size: 13px; opacity: 0.65; margin-top: 4px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }

.stat-card { border-radius: 14px; padding: 20px 16px; display: flex; align-items: flex-start; gap: 12px; box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 18px; position: relative; overflow: hidden; }

.stat-card::after { content: ""; position: absolute; right: -14px; bottom: -14px; width: 65px; height: 65px; border-radius: 50%; background: rgba(255, 255, 255, 0.08); }

.stat-card.c1 { background: linear-gradient(135deg, rgb(0, 158, 96), rgb(0, 122, 71)); }

.stat-card.c2 { background: linear-gradient(135deg, rgb(26, 45, 74), rgb(15, 52, 96)); }

.stat-card.c3 { background: linear-gradient(135deg, rgb(249, 115, 22), rgb(194, 65, 12)); }

.stat-card.c4 { background: linear-gradient(135deg, rgb(139, 92, 246), rgb(109, 40, 217)); }

.stat-icon { font-size: 26px; flex-shrink: 0; }

.stat-data { flex: 1 1 0%; z-index: 1; }

.stat-value { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: rgb(255, 255, 255); line-height: 1; }

.stat-label { font-size: 10px; color: rgba(255, 255, 255, 0.65); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; }

.stat-trend { font-size: 10px; color: rgba(255, 255, 255, 0.45); margin-top: 4px; }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.dash-card { background: rgb(255, 255, 255); border-radius: 14px; padding: 18px; box-shadow: var(--shadow); }

.dash-card-title { font-family: var(--font-display); font-size: 13px; font-weight: 800; color: var(--navy); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

.status-bars { display: flex; flex-direction: column; gap: 12px; }

.sb-item { display: flex; flex-direction: column; gap: 5px; }

.sb-item.clickable { padding: 6px 8px; margin: -6px -8px; border-radius: 8px; transition: background 0.15s; }

.sb-item.clickable:hover { background: var(--gray-bg); }

/* Photos & Logos — cadres d'import */
.photo-card { background: rgb(255,255,255); border: 1px solid var(--gray-bd); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; }

.photo-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.1); }

.photo-frame { position: relative; width: 100%; aspect-ratio: 1 / 1; background: linear-gradient(135deg,#f1f5f9,#e2e8f0); cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }

.photo-frame.has-photo { background-size: cover; background-position: center; }

.photo-frame .photo-placeholder { font-size: 30px; color: #94a3b8; }

.photo-frame .photo-overlay { position: absolute; inset: 0; background: rgba(10,22,40,0.0); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; transition: background 0.2s; }

.photo-frame:hover .photo-overlay { background: rgba(10,22,40,0.45); }

.photo-frame .photo-overlay-btn { opacity: 0; transform: translateY(6px); transition: 0.2s; background: rgba(255,255,255,0.95); color: var(--navy); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }

.photo-frame:hover .photo-overlay-btn { opacity: 1; transform: translateY(0); }

.photo-frame .photo-uploading { position: absolute; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--green); }

.photo-info { padding: 9px 10px; }

.photo-name { font-size: 12.5px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.photo-role { font-size: 11px; color: var(--gray-txt); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.default-avatar-card { background: linear-gradient(135deg,#fffbeb,#fef3c7); border: 1.5px dashed var(--warn); border-radius: var(--radius); overflow: hidden; }

.default-avatar-card .photo-frame { background: linear-gradient(135deg,#fde68a,#fcd34d); aspect-ratio: 1 / 1; }

.default-avatar-card .photo-info { text-align: center; }

.default-avatar-card .photo-role { color: var(--navy); font-weight: 700; }

.admin-only-badge { display: inline-block; font-size: 9px; font-weight: 800; color: var(--navy); background: var(--yellow); padding: 1px 6px; border-radius: 10px; margin-top: 3px; }

.sb-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }

.sb-track { height: 6px; background: var(--gray-bg); border-radius: 6px; overflow: hidden; }

.sb-fill { height: 100%; border-radius: 6px; transition: width 0.7s; }

.activity-list { display: flex; flex-direction: column; gap: 8px; }

.act-item { display: flex; align-items: center; gap: 9px; padding: 7px 0px; border-bottom: 1px solid var(--gray-bg); }

.act-item:last-child { border-bottom-width: medium; border-bottom-style: none; border-bottom-color: currentcolor; }

.act-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.act-text { font-size: 12px; color: var(--navy); flex: 1 1 0%; }

.act-time { font-size: 10px; color: var(--gray-txt); }

.quick-actions { display: flex; flex-direction: column; gap: 8px; }

.btn-action { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }

.btn-action.green { background: linear-gradient(135deg,var(--green),var(--green-dk)); color: rgb(255, 255, 255); }

.btn-action.blue { background: linear-gradient(135deg,var(--blue),#2563eb); color: rgb(255, 255, 255); }

.btn-action.outline { background: rgb(255, 255, 255); border: 1.5px solid var(--gray-bd); color: var(--navy); }

.btn-action:hover { transform: translateY(-1px); }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }

.page-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--navy); }

.filters-bar { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; align-items: stretch; }

.filter-btn { width: 100%; padding: 7px 10px; border: 1.5px solid var(--gray-bd); background: rgb(255, 255, 255); color: var(--navy); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.filter-btn:hover, .filter-btn.active { background: var(--green); color: rgb(255, 255, 255); border-color: var(--green); }

.search-box { grid-column: 1 / -1; min-width: 200px; display: flex; gap: 8px; background: rgb(255, 255, 255); border: 1.5px solid var(--gray-bd); border-radius: 8px; padding: 8px 12px; }

.search-box input { border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; outline: none; flex: 1 1 0%; font-size: 13px; color: var(--navy); }

.users-table-wrap { overflow-x: auto; background: rgb(255, 255, 255); border-radius: var(--radius); box-shadow: var(--shadow); }

table.users-table { width: 100%; border-collapse: collapse; font-size: 13px; }

table.users-table th { background: var(--gray-bg); padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-txt); border-bottom: 2px solid var(--gray-bd); white-space: nowrap; }

table.users-table td { padding: 12px; border-bottom: 1px solid var(--gray-bd); color: var(--navy); vertical-align: middle; }

table.users-table tr { cursor: pointer; transition: background 0.15s; }

table.users-table tr:hover td { background: rgb(248, 250, 252); }

table.users-table tr:last-child td { border-bottom-width: medium; border-bottom-style: none; border-bottom-color: currentcolor; }

.user-row-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,var(--green),var(--yellow)); display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: rgb(255, 255, 255); flex-shrink: 0; overflow: hidden; }

.user-row-avatar img { width: 100%; height: 100%; object-fit: cover; }

.user-name-cell { display: flex; align-items: center; gap: 10px; min-width: 0px; }

.user-name-txt { font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.user-gscid-cell { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--green-dk); background: var(--green-lt); border-radius: 14px; padding: 3px 9px; letter-spacing: .4px; white-space: nowrap; }

.user-qr-cell { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--gray-bd); background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.status-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; display: inline-block; white-space: nowrap; }
