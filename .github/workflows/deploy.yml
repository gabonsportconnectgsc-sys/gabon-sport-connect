name: Déploiement sur Firebase Hosting

on:
  push:
    branches:
      - principal

jobs:
  déployer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Écrire le fichier service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Installer Firebase Tools
        run: npm install -g firebase-tools

      - name: Déployer sur Firebase Hosting
        run: firebase deploy --only hosting --project gabon-sport-connect --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
